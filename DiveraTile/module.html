<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        :root {
            color-scheme: light dark;
            --accent: #159ec8;
            --alarm: #dc4d5e;
            --ok: #20a36b;
            --line: color-mix(in srgb, currentColor 18%, transparent);
            --panel: color-mix(in srgb, Canvas 91%, transparent);
            font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: CanvasText; }
        body { padding: 8px; }
        .card { height: 100%; min-height: 250px; padding: 10px; border: 1px solid var(--line); border-radius: 16px; background: var(--panel); overflow: hidden; }
        .symcon-title-space { height: 28px; min-height: 28px; pointer-events: none; }
        header { display: flex; align-items: center; justify-content: space-between; gap: 8px; height: 24px; }
        .live { color: color-mix(in srgb, CanvasText 60%, transparent); font-size: .62rem; }
        .dot { display: inline-block; width: 7px; height: 7px; margin-right: 5px; border-radius: 50%; background: var(--ok); }
        .badge { margin-right: 34px; padding: 5px 9px; border: 1px solid var(--line); border-radius: 9px; font-size: .6rem; font-weight: 800; }
        .active .badge { border-color: var(--alarm); color: var(--alarm); }
        .content { display: grid; grid-template-columns: 1.15fr .85fr; gap: 10px; height: calc(100% - 58px); margin-top: 6px; }
        .map { position: relative; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: color-mix(in srgb, var(--accent) 8%, Canvas); }
        .map img { width: 100%; height: 100%; object-fit: cover; }
        .standby { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; font-size: .68rem; font-weight: 800; letter-spacing: .08em; background: radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--alarm) 12%, transparent), transparent 54%); }
        .fire-engine { display: none; }
        .beacon { transform-origin: center; animation: beacon 1.35s ease-in-out infinite; }
        .beacon-glow { transform-origin: center; animation: glow 1.35s ease-in-out infinite; }
        .divera-brand { display: flex; flex-direction: column; align-items: center; gap: 7px; width: min(72%, 240px); color: CanvasText; }
        .divera-logo { display: flex; align-items: center; justify-content: center; gap: 13px; width: 100%; }
        .divera-symbol { width: 56px; height: auto; overflow: visible; filter: drop-shadow(0 4px 8px color-mix(in srgb, #fa0019 22%, transparent)); }
        .divera-name { font-size: clamp(1rem, 3.2vw, 1.45rem); font-weight: 760; line-height: 1; letter-spacing: -.045em; white-space: nowrap; }
        .divera-name b { color: #fa0019; font-weight: 840; }
        .divera-subtitle { padding-top: 6px; border-top: 1px solid var(--line); color: color-mix(in srgb, CanvasText 56%, transparent); font-size: .48rem; font-weight: 750; letter-spacing: .15em; }
        .standby span { position: absolute; bottom: 10px; padding: 5px 9px; border: 1px solid color-mix(in srgb, var(--alarm) 40%, transparent); border-radius: 8px; background: color-mix(in srgb, Canvas 88%, transparent); color: color-mix(in srgb, var(--alarm) 78%, CanvasText); }
        @keyframes beacon { 0%, 44%, 100% { opacity: .38; } 50%, 82% { opacity: 1; } }
        @keyframes glow { 0%, 44%, 100% { opacity: 0; transform: scale(.7); } 50%, 82% { opacity: .5; transform: scale(1.12); } }
        .details { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
        .field { min-height: 33px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
        .field small { display: block; opacity: .58; font-size: .52rem; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; }
        .field span { display: block; margin-top: 2px; font-size: .68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .headline { min-height: 48px; }
        .headline span { font-size: .9rem; font-weight: 750; }
        .message { flex: 1; }
        .message span { white-space: normal; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
        .offline { position: absolute; inset: auto 18px 18px; padding: 7px; border-radius: 8px; background: color-mix(in srgb, var(--alarm) 20%, Canvas); color: var(--alarm); font-size: .65rem; }
        [hidden] { display: none !important; }
        @media (max-width: 430px) { .content { grid-template-columns: 1fr 1fr; } .coords { display: none; } }
    </style>
</head>
<body>
<section class="card" id="card">
    <div class="symcon-title-space" aria-hidden="true"></div>
    <header>
        <span class="live"><i class="dot"></i><span id="updated">Live</span></span>
        <span class="badge" id="badge" hidden></span>
    </header>
    <div class="content">
        <div class="map">
            <img id="mapImage" alt="Karte des Einsatzortes" hidden>
            <div class="standby" id="standby">
                <div class="divera-brand" aria-label="DIVERA 24/7">
                    <div class="divera-logo">
                        <svg class="divera-symbol" viewBox="0 0 126 62" aria-hidden="true">
                            <path d="M29.5 5C15.9 5 5 16 5 30.5S15.9 56 29.5 56c8.3 0 15.1-3.7 20.3-10.4L76.4 10.8C81.4 4.4 88.4 1 96.5 1 112.3 1 125 14.2 125 30.5S112.3 60 96.5 60c-9.2 0-17.2-4.1-22.8-11.3l-8.1-10.9 6.7-8.8 8.3 11.2c3.9 5 9.2 7.8 15.9 7.8 9.5 0 17.3-7.8 17.3-17.5S106 13 96.5 13c-5 0-9.3 2-12.7 5.8L57.1 53.7C50 62.4 40.8 67 29.5 67 13.2 67 0 50.7 0 30.5S13.2-6 29.5-6c10.2 0 18.8 4.7 24.8 12.3l6.2 8.4-6.8 8.9-6.3-8.6C43 8.5 37 5 29.5 5z" fill="#fa0019" transform="translate(0 1) scale(.94 .88)"/>
                        </svg>
                        <div class="divera-name">DIVERA <b>24/7</b></div>
                    </div>
                    <div class="divera-subtitle">ALARM &amp; EINSATZMONITORING</div>
                </div>
                <svg class="fire-engine" viewBox="0 0 420 190" role="img" aria-label="Einsatzbereites Hilfeleistungslöschfahrzeug">
                    <defs>
                        <linearGradient id="body-red" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0" stop-color="#e64b58"/>
                            <stop offset=".55" stop-color="#c92536"/>
                            <stop offset="1" stop-color="#9f1828"/>
                        </linearGradient>
                        <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#dff7ff"/>
                            <stop offset=".45" stop-color="#7db8ce"/>
                            <stop offset="1" stop-color="#315f72"/>
                        </linearGradient>
                        <linearGradient id="shutter" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0" stop-color="#e8edf0"/>
                            <stop offset="1" stop-color="#9eabb1"/>
                        </linearGradient>
                    </defs>
                    <ellipse class="beacon-glow" cx="303" cy="32" rx="70" ry="24" fill="#159ee8" opacity="0"/>
                    <path d="M197 37h157" fill="none" stroke="#7c8990" stroke-width="8" stroke-linecap="round"/>
                    <path d="M211 28h127M225 19h99" fill="none" stroke="#b8c2c7" stroke-width="5" stroke-linecap="round"/>
                    <path d="M250 38V17M310 38V17" stroke="#707d83" stroke-width="4"/>
                    <rect class="beacon" x="287" y="30" width="31" height="14" rx="4" fill="#139de1"/>
                    <path d="M34 73l35-38h92l31 38h174c13 0 23 10 23 23v55H21V92c0-10 5-17 13-19z" fill="url(#body-red)" stroke="#781321" stroke-width="3"/>
                    <path d="M70 42h84l23 31H42z" fill="#b52131"/>
                    <path d="M78 47h38v26H53zm44 0h28l20 26h-48z" fill="url(#glass)" stroke="#294f60" stroke-width="2"/>
                    <path d="M121 46v29" stroke="#eefaff" stroke-width="3"/>
                    <path d="M86 52l22 17M129 51l27 20" stroke="#fff" stroke-width="3" opacity=".28"/>
                    <path d="M29 83h158v68H21V96c0-6 3-11 8-13z" fill="none" stroke="#f08089" stroke-width="2"/>
                    <rect x="197" y="57" width="77" height="79" rx="3" fill="url(#shutter)" stroke="#68767c" stroke-width="3"/>
                    <rect x="281" y="57" width="82" height="79" rx="3" fill="url(#shutter)" stroke="#68767c" stroke-width="3"/>
                    <path d="M204 67h63M204 76h63M204 85h63M204 94h63M204 103h63M204 112h63M204 121h63M288 67h68M288 76h68M288 85h68M288 94h68M288 103h68M288 112h68M288 121h68" stroke="#7e8b91" stroke-width="2"/>
                    <rect x="226" y="63" width="19" height="4" rx="2" fill="#526167"/>
                    <rect x="312" y="63" width="19" height="4" rx="2" fill="#526167"/>
                    <path d="M25 119h360" stroke="#f6dc45" stroke-width="9"/>
                    <path d="M25 126h360" stroke="#eef5f7" stroke-width="5"/>
                    <text x="136" y="108" fill="#fff" font-family="system-ui,sans-serif" font-size="22" font-weight="800">112</text>
                    <path d="M48 87h32m-16-16v32" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
                    <rect x="31" y="136" width="350" height="15" rx="3" fill="#751520"/>
                    <path d="M374 79l14 8v29h-14z" fill="#e9f3f6"/>
                    <rect x="15" y="137" width="25" height="10" rx="3" fill="#3b484e"/>
                    <rect x="379" y="137" width="25" height="10" rx="3" fill="#3b484e"/>
                    <path d="M41 151h322" stroke="#28343a" stroke-width="7"/>
                    <circle cx="94" cy="151" r="30" fill="#202b30" stroke="#101619" stroke-width="4"/>
                    <circle cx="94" cy="151" r="16" fill="#7f8d93" stroke="#c4cdd1" stroke-width="4"/>
                    <circle cx="94" cy="151" r="5" fill="#303d42"/>
                    <circle cx="327" cy="151" r="30" fill="#202b30" stroke="#101619" stroke-width="4"/>
                    <circle cx="327" cy="151" r="16" fill="#7f8d93" stroke="#c4cdd1" stroke-width="4"/>
                    <circle cx="327" cy="151" r="5" fill="#303d42"/>
                </svg>
                <span>EINSATZBEREIT</span>
            </div>
        </div>
        <div class="details">
            <div class="field headline"><small id="number">EINSATZ</small><span id="title">Bereit</span></div>
            <div class="field"><small>Alarmierung</small><span id="alarmTime">–</span></div>
            <div class="field"><small>Adresse</small><span id="address">–</span></div>
            <div class="field message"><small>Meldung</small><span id="message">–</span></div>
            <div class="field coords"><small>Koordinate</small><span id="coords">–</span></div>
        </div>
    </div>
    <div class="offline" id="offline" hidden></div>
</section>
<script>
    const $ = id => document.getElementById(id);
    function render(s) {
        $('card').classList.toggle('active', !!s.active);
        $('badge').hidden = !s.active;
        $('badge').textContent = s.active ? (s.priority ? 'EINSATZ · PRIORITÄT' : 'EINSATZ AKTIV') : 'BEREIT';
        $('updated').textContent = `Live · ${s.updated || '–'}`;
        $('number').textContent = s.number ? `EINSATZ ${s.number}` : 'EINSATZ';
        $('title').textContent = s.active ? (s.title || 'Ohne Stichwort') : 'Bereit';
        $('alarmTime').textContent = s.alarmTime ? new Date(s.alarmTime * 1000).toLocaleString('de-DE') : '–';
        $('address').textContent = s.address || '–';
        $('message').textContent = s.text || '–';
        const lat = Number(s.latitude), lng = Number(s.longitude);
        const hasCoords = Math.abs(lat) > .000001 && Math.abs(lng) > .000001;
        $('coords').textContent = hasCoords ? `${lat.toFixed(5)}, ${lng.toFixed(5)}` : '–';
        const showMap = !!s.active && !!s.map;
        $('mapImage').hidden = !showMap;
        $('standby').hidden = showMap;
        if (showMap && $('mapImage').src !== s.map) $('mapImage').src = s.map;
        $('offline').hidden = !!s.valid;
        $('offline').textContent = s.error || 'DIVERA-Daten momentan nicht verfügbar';
    }
    function handleMessage(data) { render(typeof data === 'string' ? JSON.parse(data) : data); }
    render(__INITIAL_STATE__);
</script>
</body>
</html>
